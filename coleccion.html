<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colección - MXSTYLO</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="header">
        <div class="logo">
            <h1>MXSTYLO</h1>
        </div>
        <nav class="nav">
            <a href="index.html">Inicio</a>
            <a href="coleccion.html" class="active">Colección</a>
            <a href="nosotros.html">Nosotros</a>
            <a href="contacto.html">Contacto</a>
        </nav>
        <div class="cart-icon"><a href="#">Carrito (0)</a></div>
    </header>

    <section class="hero-sub">
        <div class="hero-content">
            <h2>Catálogo Completo</h2>
            <p>Explora nuestras prendas disponibles en esta temporada.</p>
        </div>
    </section>

    <main class="container">
        <div class="products-grid">
            <div class="product-card">
                <div class="product-image"><img src="img/camisa chango 1.png" alt="Camisa Chango"></div>
                <div class="product-info">
                    <h3>CHANGO</h3>
                    <p class="price">$299.00</p>
                    <button class="btn-add">Agregar al carrito</button>
                </div>
            </div>
            <div class="product-card">
                <div class="product-image"><img src="img/camisa orange 1.png" alt="Camisa Orange"></div>
                <div class="product-info">
                    <h3>A CLOCKWORK ORANGE</h3>
                    <p class="price">$349.00</p>
                    <button class="btn-add">Agregar al carrito</button>
                </div>
            </div>
            <div class="product-card">
                <div class="product-image"><img src="img/camisa SOAD 1.png" alt="Camisa SOAD"></div>
                <div class="product-info">
                    <h3>SOAD</h3>
                    <p class="price">$399.00</p>
                    <button class="btn-add">Agregar al carrito</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <hr class="footer-divider">
        <p class="copyright">&copy; 2026 MXSTYLO. Todos los derechos reservados.</p>
    </footer>

</body>
</html>

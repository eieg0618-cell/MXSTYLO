<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - MXSTYLO</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="header">
        <div class="logo">
            <h1>MXSTYLO</h1>
        </div>
        <nav class="nav">
            <a href="index.html">Inicio</a>
            <a href="coleccion.html">Colección</a>
            <a href="nosotros.html">Nosotros</a>
            <a href="contacto.html" class="active">Contacto</a>
        </nav>
        <div class="cart-icon"><a href="#">Carrito (0)</a></div>
    </header>

    <section class="hero-sub">
        <div class="hero-content">
            <h2>Ponte en Contacto</h2>
            <p>¿Tienes dudas o aclaraciones? Escríbenos directamente aquí.</p>
        </div>
    </section>

    <main class="container-sub">
        <form class="custom-form" onsubmit="event.preventDefault();">
            <div class="form-group">
                <label for="name">Nombre Completo</label>
                <input type="text" id="name" required placeholder="Tu nombre">
            </div>
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="tu@correo.com">
            </div>
            <div class="form-group">
                <label for="message">Mensaje o Comentario</label>
                <textarea id="message" rows="6" required placeholder="Escribe aquí..."></textarea>
            </div>
            <button type="submit" class="btn" style="border:none; cursor:pointer;">Enviar Mensaje</button>
        </form>
    </main>

    <footer class="footer">
        <hr class="footer-divider">
        <p class="copyright">&copy; 2026 MXSTYLO. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
